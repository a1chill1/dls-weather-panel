# Place at .github/workflows/build-crew-clock-spfx.yml in the a1chill1/dls-weather-panel repo,
# alongside 2026-07-15-CrewClockWebPart.ts.
# Builds the DLS Crew Clock SPFx package and uploads the .sppkg as a download.
#
# Mirrors the Property & Deed Map pipeline (2026-06-18-build-property-map-spfx.yml) with
# three deliberate differences:
#   1. SEPARATE SOLUTION — new solution/component IDs, its own dist/ filename. This must
#      never touch dls-property-map.sppkg; a shared bundle has silently overwritten work here.
#   2. No Leaflet — this web part has no map, so no bundling step and no CDN workaround.
#   3. dist/ commit step omitted — grab the .sppkg from the run's Artifacts tab. (The Deed Map
#      workflow commits to dist/; that was for a repeatedly-rebuilt bundle. Add it back if
#      Crew Clock starts iterating that often.)
#
# PINNED IDs mean a rebuild UPGRADES the deployed app in place — bump `version` below on
# every rebuild or the App Catalog will not offer the upgrade.
# Run from the Actions tab. No secrets needed.
name: Build Crew Clock SPFx package

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.17.1"

      - name: Install SPFx toolchain
        run: npm install -g gulp-cli yo@4.3.1 @microsoft/generator-sharepoint@1.18.2

      - name: Scaffold a clean SPFx solution
        run: |
          yo @microsoft/sharepoint \
            --solution-name "dls-crew-clock" \
            --component-type webpart \
            --component-name "DlsCrewClock" \
            --component-description "DLS Crew Clock — GPS-assisted crew time tracking" \
            --framework none \
            --skip-install true \
            --no-insight
          ls -la dls-crew-clock/src/webparts/dlsCrewClock/ || true

      - name: Inject the Crew Clock web part code
        run: cp 2026-07-15-CrewClockWebPart.ts dls-crew-clock/src/webparts/dlsCrewClock/DlsCrewClockWebPart.ts

      - name: Pin solution + component IDs (upgrade in place) and set version
        run: |
          cd dls-crew-clock
          python3 - << 'PY'
          import json, glob, re
          ps = 'config/package-solution.json'
          d = json.load(open(ps, encoding='utf-8'))
          # NEW ids — must never equal the Deed Map's 9a4c2e18-.../4f8b1d62-...
          d['solution']['id'] = 'a432c33b-7531-4de7-ba90-0838691ca757'
          d['solution']['version'] = '1.0.0.6'
          # THE RENDER-BUG FIX (2026-07-16). The non-interactive `yo` scaffold defaults this to
          # false, which makes the solution non-tenant-scoped: its component never lands in the
          # tenant's aggregated manifest catalog, so GetClientSideWebParts() cannot see it on ANY
          # site and the web part renders as an empty zone. The sibling dls-weather-panel package
          # ships true, which is the entire reason it works. Six sessions read this as backend
          # propagation lag. It is not — it is this line.
          d['solution']['skipFeatureDeployment'] = True
          json.dump(d, open(ps, 'w', encoding='utf-8'), indent=2)
          mf = glob.glob('src/webparts/dlsCrewClock/*.manifest.json')[0]
          t = open(mf, encoding='utf-8').read()
          t2 = re.sub(r'("id"\s*:\s*")[0-9a-fA-F-]{36}(")',
                      r'\g<1>cfaaf79e-12e9-465b-a695-3126f6f01109\g<2>', t, count=1)
          assert t2 != t, 'manifest component id not found/replaced'
          open(mf, 'w', encoding='utf-8').write(t2)
          print('Pinned solution id+version in', ps, 'and component id in', mf)
          PY

      - name: Install dependencies
        run: |
          cd dls-crew-clock
          npm install
          npm install @microsoft/sp-http@1.18.2 --save --legacy-peer-deps

      - name: Build + package (ship)
        run: |
          cd dls-crew-clock
          gulp bundle --ship
          gulp package-solution --ship
          ls -la sharepoint/solution/

      - name: Upload the .sppkg
        uses: actions/upload-artifact@v4
        with:
          name: dls-crew-clock-sppkg
          path: dls-crew-clock/sharepoint/solution/*.sppkg
          if-no-files-found: error
